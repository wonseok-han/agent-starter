name: Release

# v로 시작하는 태그를 push하면(예: v0.1.0) 설치 파일을 빌드해
# GitHub Release 초안(draft)으로 올린다. 초안이라 사람이 검토 후 직접 공개한다.
on:
  push:
    tags:
      - "v*"

# 릴리스 생성·아티팩트 업로드를 위해 쓰기 권한이 필요하다.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS는 Intel·Apple Silicon 공용 유니버설 바이너리 하나로 배포한다.
          - os: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "x86_64-apple-darwin,aarch64-apple-darwin"
          - os: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 빌드 + GitHub Release(초안) 업로드
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── 코드 서명(선택) ──────────────────────────────────────────────
          # 인증서를 등록하고 아래 저장소 시크릿을 채우면 자동으로 서명·공증한다.
          # 비어 있으면 미서명 빌드로 나가고(다운로드 시 보안 경고), 채우면 켜진다.
          # macOS: Apple Developer($99/년) 발급 Developer ID + 공증 자격
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hello, Agent ${{ github.ref_name }}"
          releaseBody: |
            터미널 없이 코딩 에이전트를 설치·설정하도록 돕는 데스크톱 앱입니다.

            - macOS: `.dmg` (Intel·Apple Silicon 공용)
            - Windows: `.exe` 설치 파일

            현재 미서명 베타 빌드라 처음 실행 시 보안 경고가 뜰 수 있습니다.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
